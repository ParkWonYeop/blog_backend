spring:
  datasource:
    url: jdbc:postgresql://db:5432/blog_db
    username: ${SPRING_DATASOURCE_USERNAME}
    password: your_password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: redis
      port: 6379
jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 1800000  # 30분 (ms)
  refresh-token-validity: 604800000 # 7일 (ms)