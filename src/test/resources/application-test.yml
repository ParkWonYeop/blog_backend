spring:
  datasource:
    url: jdbc:h2:mem:blog_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=COMMENT,USER
    username: sa
    password:
    driver-class-name: org.h2.Driver

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
        show_sql: false
    open-in-view: false

  mail:
    host: localhost
    port: 2525
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: false
          connectiontimeout: 100
          timeout: 100
          writetimeout: 100

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    aws:
      s3:
        bucket: test-bucket
        endpoint: http://localhost:9000
        path-style-access-enabled: true
      credentials:
        access-key: test
        secret-key: test
      region:
        static: ap-northeast-2
      stack:
        auto: false

jwt:
  secret: c2VjcmV0LWtleS1mb3ItdGVzdC1hZG1pbi1kYXNoYm9hcmQtMzItYnl0ZXM=
  access-token-validity: 600000
  refresh-token-validity: 604800000

blog:
  image:
    initialize-bucket: false
